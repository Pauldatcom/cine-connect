# Cloud Build — monorepo backend image (backend/Dockerfile from repo root).
#
# Environment (dev vs prod): set _DEPLOY_ENV per trigger (e.g. tag v* → prod, dev/* → dev).
# Images: backend:{_DEPLOY_ENV}-{SHORT_SHA} and backend:{_DEPLOY_ENV}-latest
#
# After push, deploys to Cloud Run (same pipeline). IAM required on Cloud Build SA:
#   - roles/run.admin (or run.developer + deployer role as per GCP docs)
#   - roles/iam.serviceAccountUser on the Cloud Run runtime service account
#
# Trigger substitutions: override _CLOUD_RUN_SERVICE for dev vs prod services if needed.

substitutions:
  _REGION: europe-west4
  _AR_REPO: cine-connect-ar
  _CLOUD_RUN_SERVICE: backend
  # dev | prod — must match your trigger (prod for v*, dev for dev/*)
  _DEPLOY_ENV: prod

steps:
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_DEPLOY_ENV}-${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_DEPLOY_ENV}-latest
      - .

  # Push before deploy — the old `images:` field runs only after ALL steps, so deploy would run too soon.
  - id: push-revision-tag
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_DEPLOY_ENV}-${SHORT_SHA}

  - id: push-latest-tag
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_DEPLOY_ENV}-latest

  - id: deploy-cloud-run
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_CLOUD_RUN_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_DEPLOY_ENV}-${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
